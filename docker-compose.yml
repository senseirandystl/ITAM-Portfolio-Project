version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: itam_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: itam_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecurepassword123}
    ports:
      - "5432:5432"
    volumes:
      - itam_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d itam_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  itam_pgdata:
